name: Fetch Unread Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1-5"  # 平日 12:00 JST
    - cron: "30 7 * * 1-5" # 平日 16:30 JST

jobs:
  fetch-unread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm exec playwright install --with-deps chromium

      - uses: actions/cache@v4
        with:
          path: data/seen-posts.json
          key: seen-posts

      - run: pnpm exec playwright test -g "fetch unread"
        env:
          CODMON_EMAIL: ${{ secrets.CODMON_EMAIL }}
          CODMON_PW: ${{ secrets.CODMON_PW }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v7
        if: always() && !env.ACT
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7
