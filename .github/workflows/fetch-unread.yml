name: Fetch Unread Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "45 2 * * 1-5"  # 平日 11:45 JST
    - cron: "15 7 * * 1-5" # 平日 16:15 JST
    - cron: "30 9 * * 1-5" # 平日 18:30 JST

jobs:
  fetch-unread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - run: pnpm exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - uses: actions/cache/restore@v5
        with:
          path: data/seen-posts.json
          key: seen-posts-${{ github.run_id }}
          restore-keys: seen-posts-

      - run: pnpm exec playwright test -g "fetch unread"
        env:
          CODMON_EMAIL: ${{ secrets.CODMON_EMAIL }}
          CODMON_PW: ${{ secrets.CODMON_PW }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: data/seen-posts.json
          key: seen-posts-${{ github.run_id }}
